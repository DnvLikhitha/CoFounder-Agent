# Local development: PostgreSQL + Redis
# Use with .env: DATABASE_URL=postgresql+asyncpg://dev:devpassword@localhost:5432/cofounder_db
#               REDIS_URL=redis://localhost:6379
#
# For DB schema, run the SQL from PRD Section 10 in your Postgres.
# Or use Supabase cloud (no need to run postgres here).

version: "3.9"
services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: cofounder_db
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: devpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
